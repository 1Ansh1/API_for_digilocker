# A generic, single-database configuration.

[alembic]
# Path to migration scripts.
script_location = migrations

# Template used to generate migration file names.
# Uncomment the line below if you want the files to be named with a datestamp.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# This is overridden programmatically in migrations/env.py using app settings.
sqlalchemy.url = mysql+aiomysql://digilocker:changeme@localhost:3309/digilocker_verification

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

[post_write_hooks]
# Hooks can be added here for auto-formatting migrations.
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

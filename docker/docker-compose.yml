version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: digilocker-mysql
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-changeme_in_production}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-digilocker_verification}
      MYSQL_USER: ${MYSQL_USER:-digilocker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_in_production}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "${MYSQL_PORT:-3309}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-digilocker}", "-p${MYSQL_PASSWORD:-changeme_in_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: digilocker-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
